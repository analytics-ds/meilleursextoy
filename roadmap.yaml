# Roadmap editoriale meilleursextoy.com
#
# 49 mots-cles longue traine planifies sur ~5,5 mois (2 articles/semaine, mardi + vendredi).
# Source volume : Semrush Bulk Analysis db=fr (extrait 2026-05-27).
#
# Format aligne sur les autres PBN de Pierre (cf. /Users/pierregaudard/meilleur-transport/roadmap.yaml).
# Alimente les skills /create-article-seo (local, mode A roadmap) ou /create-article-auto (cloud).
#
# NOTE LANGUE
# -----------
# meilleursextoy est mono-langue FR (pas de version EN comme meilleur-transport).
# Le champ published_url_en restera null. La skill devra etre adaptee si elle force la traduction.
#
# COMMENT REPRENDRE LA MAIN
# ------------------------
# - status: done -> ne pas re-publier
# - status: todo -> publication eligible si scheduled_date <= today
# - status: failed -> repasser a todo apres correction manuelle de l'erreur
#
# CATEGORIES UTILISEES
# --------------------
# - Anatomie  : KW educatifs sur le corps (squirting, point G, clitoris)
# - Guides    : KW pratiques (choix, achat, discretion)
# - Comparatifs : KW commerciaux "meilleur X" ou "X vs Y"
# - Couples   : KW autour de l'usage a deux
# - Entretien : KW sur le nettoyage, materiau, charge, durabilite
# - Sante     : KW YMYL (grossesse, menopause, post-accouchement, etc.)
#
# PLANIFICATION
# -------------
# Mardi + vendredi a partir du 2026-06-02.
# Premiers articles priorises par volume Semrush + intent commerciale.

