baseURL = 'https://meilleursextoy.com/'
title = 'Meilleur Sextoy'
theme = 'lusty'

defaultContentLanguage = 'fr'
defaultContentLanguageInSubdir = false

# buildFuture = false : Hugo cache les articles avec une date dans le futur.
buildFuture = false

[taxonomies]
  category = 'categories'

[markup.goldmark.renderer]
  unsafe = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[languages.fr]
  languageName = 'Français'
  languageCode = 'fr-FR'
  weight = 1
  title = 'Meilleur Sextoy'
  [languages.fr.params]
    description = "Guides, avis et comparatifs de sextoys pour explorer votre intimité sans tabou."
    author_name = "Camille Reverdy"
    author_url = "/a-propos/"
    author_role = "Rédactrice et testeuse intimité"
    primary = "#332925"
    background = "#FFF8F5"
    cta = "#FD2879"
  [[languages.fr.menus.main]]
    name = 'Accueil'
    pageRef = '/'
    weight = 1
  [[languages.fr.menus.main]]
    name = 'Produits'
    pageRef = '/produits/'
    weight = 2
  [[languages.fr.menus.main]]
    name = 'Comparatifs'
    pageRef = '/categories/comparatifs/'
    weight = 3
  [[languages.fr.menus.main]]
    name = 'Guides'
    pageRef = '/categories/guides/'
    weight = 4
  [[languages.fr.menus.main]]
    name = 'Blog'
    pageRef = '/blog/'
    weight = 5

[languages.en]
  languageName = 'English'
  languageCode = 'en-US'
  weight = 2
  title = 'Best Sextoy'
  [languages.en.params]
    description = "Sex toy guides, reviews and comparisons to explore your intimacy without taboo."
    author_name = "Camille Reverdy"
    author_url = "/en/about/"
    author_role = "Writer and intimacy tester"
    primary = "#332925"
    background = "#FFF8F5"
    cta = "#FD2879"
  [[languages.en.menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 1
  [[languages.en.menus.main]]
    name = 'Products'
    pageRef = '/produits/'
    weight = 2
  [[languages.en.menus.main]]
    name = 'Comparisons'
    pageRef = '/categories/comparatifs/'
    weight = 3
  [[languages.en.menus.main]]
    name = 'Guides'
    pageRef = '/categories/guides/'
    weight = 4
  [[languages.en.menus.main]]
    name = 'Blog'
    pageRef = '/blog/'
    weight = 5

# llms.txt : fichier pour les moteurs IA (GEO), genere automatiquement
[outputFormats.LLMS]
  mediaType = 'text/plain'
  baseName = 'llms'
  isPlainText = true
  notAlternative = true

[outputs]
  home = ['HTML', 'RSS', 'LLMS']
