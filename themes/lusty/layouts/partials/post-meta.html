{{/* Meta box article : avatar auteur + nom + date + temps de lecture */}}
<div class="post-meta">
    {{ with .Params.author }}
    <span class="post-meta-avatar" aria-hidden="true">
        <img src="{{ "images/author/camille.jpg" | relURL }}" alt="{{ . }}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='{{ substr . 0 1 }}';">
    </span>
    <span class="post-meta-author">{{ . }}</span>
    <span class="post-meta-sep">·</span>
    {{ end }}
    {{ if not .Date.IsZero }}
    <time class="post-meta-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format ":date_long" }}</time>
    {{ end }}
    {{ with .ReadingTime }}
    <span class="post-meta-sep">·</span>
    <span class="post-meta-reading">{{ . }} {{ i18n "reading_time" }}</span>
    {{ end }}
</div>
