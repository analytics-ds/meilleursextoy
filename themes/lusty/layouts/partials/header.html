<header class="site-header">
    <div class="header-container">
        <a href="{{ "/" | relURL }}" class="site-logo" aria-label="Meilleur Sextoy, accueil">
            <img src="{{ "images/logo/logo-isolated.png" | relLangURL }}" alt="Meilleur Sextoy" class="site-logo-icon" width="72" height="72">
        </a>

        <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
            <span class="hamburger"></span>
        </button>

        <nav class="site-nav" role="navigation">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | relURL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
                {{ .Name }}
            </a>
            {{ end }}
            <a href="{{ "blog/" | relURL }}" class="nav-cta">Voir le top</a>
        </nav>
    </div>
</header>

<script>
document.querySelector('.menu-toggle').addEventListener('click', function() {
    const nav = document.querySelector('.site-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    nav.classList.toggle('nav-open');
});

(function() {
    const header = document.querySelector('.site-header');
    const onScroll = () => {
        if (window.scrollY > 60) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
})();
</script>
