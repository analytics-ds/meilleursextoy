<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "fr" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }} : guides, avis et comparatifs pour adultes{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="robots" content="index,follow">

    {{ partial "seo-head.html" . }}

    <link rel="icon" href="{{ "favicon.ico" | relLangURL }}" sizes="32x32">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ "images/logo/favicon-16.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ "images/logo/favicon-32.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ "images/logo/favicon-192.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ "images/logo/favicon-512.png" | relURL }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "images/logo/apple-touch-icon.png" | relURL }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    {{ $css := resources.Get "css/main.css" }}
    {{ if $css }}
        <link rel="stylesheet" href="{{ $css.RelPermalink }}">
    {{ end }}
</head>
<body class="{{ if .IsHome }}has-hero{{ else }}no-hero{{ end }}">
    {{ partial "header.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
</body>
</html>
